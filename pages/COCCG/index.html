<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CoC Character Manager</title>

<!-- Animate.css -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
<link rel="stylesheet" href="../../css/COCCG.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<h1 class="animate__animated animate__fadeInDown">
Call of Cthulhu Character Manager
</h1>

<!-- ================= CHARACTER MANAGER ================= -->
<div class="card">
<h2>Character Manager</h2>

<input id="nameInput" placeholder="Investigator Name">
<input id="jobInput" placeholder="Occupation">

<button onclick="createCharacter()">➕ Create Character</button>
<button onclick="generateCharacter()">🎲 Auto Roll + Save</button>

<div id="characterList"></div>
</div>

<div class="card">
<h2>Selected Character</h2>


<div id="selectedCharacter" class="output">No character selected</div>

<div class="card">
  <h2>Stat Radar</h2>
  <canvas id="statChart"></canvas>
</div>

<div id="stats" class="stat-grid"></div>

<button onclick="updateCharacter()">💾 Save Changes</button>
<button onclick="deleteCharacter()">🗑 Delete</button>
</div>

<!-- ================= DICE ================= -->
<div class="card">
<h2>Dice Roller</h2>

<div id="diceOutput" class="output"></div>

<div class="dice-buttons">
<button onclick="quickRoll(4)">d4</button>
<button onclick="quickRoll(6)">d6</button>
<button onclick="quickRoll(8)">d8</button>
<button onclick="quickRoll(10)">d10</button>
<button onclick="quickRoll(12)">d12</button>
<button onclick="quickRoll(20)">d20</button>
<button onclick="quickRoll(100)">d100</button>
</div>

<input id="diceInput" placeholder="Example: 2d6+3">
<button onclick="rollDice()">Roll Custom</button>
</div>

</div>

<script src="../../js/COCCG.js"></script>

</body>
</html>
